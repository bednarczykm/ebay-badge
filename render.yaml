services:
  - type: web
    name: ebay-trust-badge
    runtime: python
    buildCommand: pip install -r requirements.txt && apt-get update && apt-get install -y fonts-dejavu-core || true
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
